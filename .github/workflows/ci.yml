name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: macos-14          # Apple Silicon runner (macOS 14 Sonoma)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download adb (binary not stored in git) ────────────────────────────
      - name: Download adb
        run: |
          curl -fsSL -o /tmp/pt.zip \
            https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
          unzip -j /tmp/pt.zip platform-tools/adb \
            -d PixelBackupApp/Sources/PixelBackup/Resources/
          chmod +x PixelBackupApp/Sources/PixelBackup/Resources/adb
          echo "adb version: $(PixelBackupApp/Sources/PixelBackup/Resources/adb version)"

      # ── Swift build ────────────────────────────────────────────────────────
      - name: Build (debug)
        run: swift build --package-path PixelBackupApp

      # ── Shell script syntax check ──────────────────────────────────────────
      - name: Lint pixel_backup.sh
        run: bash -n pixel_backup.sh && echo "Shell script syntax OK"
